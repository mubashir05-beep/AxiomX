<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="#0f3460" stroke-width="3"/>
  
  <!-- Outer ring gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Candlestick chart elements -->
  <g opacity="0.3">
    <line x1="45" y1="120" x2="45" y2="80" stroke="#4ecdc4" stroke-width="2"/>
    <rect x="40" y="95" width="10" height="20" fill="#4ecdc4" rx="1"/>
    
    <line x1="70" y1="140" x2="70" y2="70" stroke="#ff6b6b" stroke-width="2"/>
    <rect x="65" y="85" width="10" height="45" fill="#ff6b6b" rx="1"/>
    
    <line x1="130" y1="110" x2="130" y2="60" stroke="#4ecdc4" stroke-width="2"/>
    <rect x="125" y="75" width="10" height="30" fill="#4ecdc4" rx="1"/>
    
    <line x1="155" y1="130" x2="155" y2="90" stroke="#ff6b6b" stroke-width="2"/>
    <rect x="150" y="105" width="10" height="20" fill="#ff6b6b" rx="1"/>
  </g>
  
  <!-- Central "A" lettermark -->
  <g transform="translate(100, 100)">
    <!-- Triangle shape for A -->
    <path d="M -25 30 L 0 -35 L 25 30 L 15 30 L 0 -10 L -15 30 Z" 
          fill="url(#grad1)" 
          stroke="#00d4ff" 
          stroke-width="2"/>
    
    <!-- Horizontal bar in A -->
    <rect x="-12" y="8" width="24" height="5" fill="#1a1a2e" rx="1"/>
  </g>
  
  <!-- Stylized "X" accent -->
  <g transform="translate(100, 100)" opacity="0.7">
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Orbital rings -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.3" stroke-dasharray="5,5">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 100 100"
      to="360 100 100"
      dur="20s"
      repeatCount="indefinite"/>
  </circle>
  
  <!-- Text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00d4ff" text-anchor="middle">
    AxiomX
  </text>
</svg>
