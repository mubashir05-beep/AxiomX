apiVersion: v1
kind: Secret
metadata:
  name: trading-engine-secrets
  namespace: trading
type: Opaque
stringData:
  DATABASE_URL: "postgres://axiomx:PASSWORD@rds-endpoint:5432/trading?sslmode=require"
  KAFKA_BROKER: "kafka-bootstrap-servers:9092"
  REDIS_ADDR: "redis-endpoint:6379"
  REDIS_PASSWORD: "redis-auth-token"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trading-engine-config
  namespace: trading
data:
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  METRICS_PORT: "8080"
  PPROF_ENABLED: "true"
