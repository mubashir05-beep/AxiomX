apiVersion: v1
kind: Service
metadata:
  name: trading-engine
  namespace: trading
  labels:
    app: trading-engine
spec:
  type: ClusterIP
  selector:
    app: trading-engine
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  - name: pprof
    port: 6060
    targetPort: pprof
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: trading-engine-headless
  namespace: trading
  labels:
    app: trading-engine
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for DNS
  selector:
    app: trading-engine
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trading-engine-hpa
  namespace: trading
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trading-engine
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: trading-engine
  namespace: trading
  labels:
    app: trading-engine
spec:
  selector:
    matchLabels:
      app: trading-engine
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s