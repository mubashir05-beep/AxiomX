# Default values for trading-engine Helm chart
# This is a YAML-formatted file, declare variables to be passed into templates

# Number of replica pods
replicaCount: 3

image:
  repository: axiomx
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Environment variables (non-sensitive)
environment:
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
  METRICS_PORT: "8080"
  PPROF_ENABLED: "false"
  REQUEST_TIMEOUT: "30s"
  MAX_ORDER_SIZE: "1000000"
  MAX_POSITION_SIZE: "10000000"

# Secrets (update with actual values from Terraform outputs)
secrets:
  DATABASE_URL: "postgres://axiomx:password@rds-endpoint:5432/axiomx?sslmode=require"
  KAFKA_BROKERS: "kafka:9092"
  REDIS_ADDR: "redis:6379"
  REDIS_PASSWORD: "redis-password"

# Health Probes
probes:
  liveness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  readiness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  
  startup:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 30

# Monitoring Configuration
monitoring:
  servicemonitor:
    enabled: true
    scrape_path: /metrics
    interval: 30s
  cloudwatch:
    enabled: false
    log_group: "/axiomx/trading-engine"

# Security configuration
security:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Prometheus monitoring
prometheus:
  enabled: true
  port: 8080
  path: /metrics
  interval: 30s
