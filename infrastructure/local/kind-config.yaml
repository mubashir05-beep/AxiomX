# Kind cluster configuration for local development
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: axiomx-local

# 3 nodes to simulate production (1 control plane + 2 workers)
nodes:
  - role: control-plane
    image: kindest/node:v1.28.0
    extraPortMappings:
      # Map container port 8080 to host port 8080
      - containerPort: 8080
        hostPort: 8080
        protocol: TCP
      # Map container port 9092 (Kafka) to host port 9092
      - containerPort: 9092
        hostPort: 9092
        protocol: TCP

  - role: worker
    image: kindest/node:v1.28.0

  - role: worker
    image: kindest/node:v1.28.0

# Networking
networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
