# Local deployment manifest for trading engine
apiVersion: v1
kind: ConfigMap
metadata:
  name: trading-engine-config
  namespace: trading
data:
  LOG_LEVEL: "debug"
  ENVIRONMENT: "local"
  METRICS_PORT: "8080"
  DATABASE_URL: "postgres://axiomx:localdev123@postgres:5432/trading?sslmode=disable"
  KAFKA_BROKERS: "kafka:9092"
  REDIS_ADDR: "redis:6379"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-engine
  namespace: trading
  labels:
    app: trading-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trading-engine
  template:
    metadata:
      labels:
        app: trading-engine
    spec:
      containers:
        - name: trading-engine
          image: axiomx-trading-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: trading-engine-config
                  key: LOG_LEVEL
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: trading-engine-config
                  key: ENVIRONMENT
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: trading-engine-config
                  key: DATABASE_URL
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: trading-engine-config
                  key: KAFKA_BROKERS
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: trading-engine-config
                  key: REDIS_ADDR
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: trading-engine
  namespace: trading
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: trading-engine
